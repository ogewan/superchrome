<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Super Tool</title>
    <link rel="stylesheet" href="popup.css">
</head>

<body>
    <div class="dock-container">
        <div class="dock">
            <div class="dock-icon" id="icon-urls-manager" data-tool="urls-manager" title="Get/Open all URLs">
                <span class="icon-placeholder">📋</span>
            </div>
            <div class="dock-icon" id="icon-remove-dupes" data-tool="remove-dupes" title="Remove duplicates">
                <span class="icon-placeholder">🗑️</span>
            </div>
            <div class="dock-icon" id="icon-partition-tabs" data-tool="partition-tabs" title="Partition tabs">
                <span class="icon-placeholder">📊</span>
            </div>
            <div class="dock-icon" id="icon-memory-manager" data-tool="memory-manager" title="Memory manager">
                <span class="icon-placeholder">💾</span>
            </div>
            <div class="dock-icon" id="icon-group-control" data-tool="group-control" title="Group Control Panel">
                <span class="icon-placeholder">🗂️</span>
            </div>
        </div>
    </div>
    <script src="popup.js"></script>
</body>

</html>
